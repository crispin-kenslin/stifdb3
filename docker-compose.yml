version: "3.9"
services:
  backend:
    build: ./backend
    container_name: tf-backend
    volumes:
      - ./data:/data
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: tf-frontend
    environment:
      - VITE_API_BASE=http://localhost:8000
    ports:
      - "4173:4173"
    depends_on:
      - backend
